version: 2

project_name: pbvex

dist: dist

before:
  hooks:
    - go -C backend mod download

builds:
  - id: build_noncgo
    dir: ./backend
    main: ./cmd/pbvex
    binary: pbvex
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/pocketbase/pocketbase.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - s390x
      - ppc64le
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: ppc64le
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le

release:
  draft: false

archives:
  - id: archive_noncgo
    ids:
      - build_noncgo
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE.md
      - CHANGELOG.md
      - README.md
      - docs/*.md
      - docs/**/*.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{.ShortCommit}}'

changelog:
  sort: asc
  filters:
    exclude:
      - '^test:'
      - '^docs:'
      - '^chore:'
      - '^examples:'
      - '^ui:'
