name: Publish Backend Binaries

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.6'

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.17.0
          package-manager-cache: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build PBVex CLI
        run: pnpm --filter pbvex... build

      - name: Validate release tag
        run: ./scripts/validate-tag.sh

      - name: Test backend
        working-directory: backend
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -count=1 ./...
          CGO_ENABLED=1 go test -race -count=1 ./...

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Validate release archives
        run: ./scripts/release-validate.sh

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: github-release
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.6'

      - name: Validate release tag
        run: ./scripts/validate-tag.sh

      - name: Publish GitHub release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archives
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-checksums: dist/checksums.txt
